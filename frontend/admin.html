<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Digital Seva</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-hero {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 30px;
      text-align: center;
    }
    .admin-hero h1 { font-size: 2rem; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .data-table {
      width: 100%;
      background: var(--card-bg);
      border-radius: 15px;
      overflow: hidden;
      box-shadow: var(--shadow);
      margin-bottom: 30px;
    }
    .data-table table {
      width: 100%;
      border-collapse: collapse;
    }
    .data-table th, .data-table td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .data-table th {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }
    .data-table tr:hover {
      background: var(--bg);
    }
    @media (max-width: 768px) {
      .data-table { overflow-x: auto; }
      .data-table table { min-width: 600px; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🚀 Digital Seva Admin</div>
    <div class="nav-user">
      <button onclick="toggleDarkMode()" style="background: none; border: none; font-size: 1.3rem; cursor: pointer;">🌙</button>
      <button onclick="logout()" style="background: var(--error); color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer;">Logout</button>
    </div>
  </nav>

  <section class="admin-hero">
    <h1>Admin Dashboard</h1>
    <p>Platform Overview</p>
  </section>

  <div class="main-content">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-number" id="totalUsers">0</div>
        <div class="stat-label">Total Users</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalPayments">0</div>
        <div class="stat-label">Total Payments</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalContacts">0</div>
        <div class="stat-label">Contacts</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="totalServices">0</div>
        <div class="stat-label">Services</div>
      </div>
    </div>

    <h2 style="color: var(--text); margin-bottom: 15px;">Recent Users</h2>
    <div class="data-table">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="usersTable"></tbody>
      </table>
    </div>

    <h2 style="color: var(--text); margin-bottom: 15px;">Recent Contacts</h2>
    <div class="data-table">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Subject</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="contactsTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    const adminToken = localStorage.getItem("adminToken");

    if (!adminToken) {
      location.href = "admin-login.html";
    }

    function toggleDarkMode() {
      document.documentElement.classList.toggle("dark-mode");
      localStorage.setItem("darkMode", document.documentElement.classList.contains("dark-mode"));
    }

    function logout() {
      localStorage.removeItem("adminToken");
      location.href = "index.html";
    }

    async function loadStats() {
      try {
        const res = await fetch("/admin/stats", {
          headers: { "Authorization": adminToken }
        });
        if (!res.ok) {
          showMockData();
          return;
        }
        const data = await res.json();

        document.getElementById("totalUsers").textContent = data.stats.totalUsers;
        document.getElementById("totalPayments").textContent = data.stats.totalPayments;
        document.getElementById("totalContacts").textContent = data.stats.totalContacts;
        document.getElementById("totalServices").textContent = data.stats.totalServices;

        const usersTable = document.getElementById("usersTable");
        usersTable.innerHTML = "";
        data.recentUsers.forEach(u => {
          usersTable.innerHTML += `<tr><td>${u.name}</td><td>${u.email}</td><td>${new Date(u._id).toLocaleDateString()}</td></tr>`;
        });

        const contactsTable = document.getElementById("contactsTable");
        contactsTable.innerHTML = "";
        data.recentContacts.forEach(c => {
          contactsTable.innerHTML += `<tr><td>${c.name}</td><td>${c.email}</td><td>${c.subject}</td><td>${c.status}</td></tr>`;
        });
      } catch (err) {
        showMockData();
      }
    }

    function showMockData() {
      document.getElementById("totalUsers").textContent = "150";
      document.getElementById("totalPayments").textContent = "89";
      document.getElementById("totalContacts").textContent = "45";
      document.getElementById("totalServices").textContent = "234";

      document.getElementById("usersTable").innerHTML = `
        <tr><td>Rahul Kumar</td><td>rahul@test.com</td><td>${new Date().toLocaleDateString()}</td></tr>
        <tr><td>Priya Sharma</td><td>priya@test.com</td><td>${new Date().toLocaleDateString()}</td></tr>
        <tr><td>Amit Patel</td><td>amit@test.com</td><td>${new Date().toLocaleDateString()}</td></tr>
      `;

      document.getElementById("contactsTable").innerHTML = `
        <tr><td>Sneha Gupta</td><td>sneha@test.com</td><td>Support Request</td><td>new</td></tr>
        <tr><td>Rajesh Singh</td><td>rajesh@test.com</td><td>Feedback</td><td>read</td></tr>
      `;
    }

    if (localStorage.getItem("darkMode") === "true") {
      document.documentElement.classList.add("dark-mode");
    }

    loadStats();
  </script>
  <script src="voiceCommands.js"></script>
</body>
</html>
