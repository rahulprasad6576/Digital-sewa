<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Digital Seva</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <script>
    if (window.location.protocol === 'file:') {
      document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;text-align:center;"><div><h1>⚠️ Please Start the Server</h1><p>Open this site via <a href="http://localhost:5000/login.html">http://localhost:5000/login.html</a></p><p>Run: <code>npm start</code> in the project folder</p></div></div>';
      throw new Error('File protocol detected');
    }
  </script>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="bg-shape bg-shape-3"></div>

  <div class="page-controls">
    <button class="lang-switch" onclick="toggleLang()">हिंदी</button>
    <button onclick="toggleDarkMode()">🌙</button>
  </div>

  <a href="index.html" class="back-link">← Home</a>

  <div class="auth-container" data-reveal>
    <div class="logo" data-tilt>
      <h1>🚀 Digital Seva</h1>
      <p data-key="tagline">Logon ko digital services easy banana</p>
    </div>
    <h2 data-key="loginTitle">Login</h2>
    <div class="input-group">
      <input id="email" type="email" placeholder="Enter Email" data-key-placeholder="emailPlaceholder">
    </div>
    <div class="input-group">
      <input id="password" type="password" placeholder="Enter Password" data-key-placeholder="passwordPlaceholder">
    </div>
    <button class="btn" onclick="login()" data-key="loginBtn">Login</button>
    <div class="link">
      <span data-key="noAccount">Don't have an account?</span> <a href="signup.html" data-key="signupLink">Sign Up</a>
    </div>
    <div class="link">
      <a href="#" onclick="voiceLogin()" style="color: var(--primary);">🎤 Voice Login</a>
    </div>
  </div>

  <script>
    const translations = {
      en: {
        tagline: "Logon ko digital services easy banana",
        loginTitle: "Login",
        emailPlaceholder: "Enter Email",
        passwordPlaceholder: "Enter Password",
        loginBtn: "Login",
        noAccount: "Don't have an account?",
        signupLink: "Sign Up"
      },
      hi: {
        tagline: "लोगों को डिजिटल सेवाएं आसान बनाना",
        loginTitle: "लॉगिन",
        emailPlaceholder: "ईमेल दर्ज करें",
        passwordPlaceholder: "पासवर्ड दर्ज करें",
        loginBtn: "लॉगिन",
        noAccount: "खाता नहीं है?",
        signupLink: "साइन अप"
      }
    };

    let currentLang = localStorage.getItem("lang") || "en";

    function applyLang() {
      const t = translations[currentLang];
      document.querySelectorAll("[data-key]").forEach(el => {
        el.textContent = t[el.dataset.key];
      });
      document.querySelectorAll("[data-key-placeholder]").forEach(el => {
        el.placeholder = t[el.dataset.keyPlaceholder];
      });
      document.querySelector(".lang-switch").textContent = currentLang === "en" ? "हिंदी" : "English";
    }

    function toggleLang() {
      currentLang = currentLang === "en" ? "hi" : "en";
      localStorage.setItem("lang", currentLang);
      applyLang();
    }

    function toggleDarkMode() {
      document.documentElement.classList.toggle("dark-mode");
      localStorage.setItem("darkMode", document.documentElement.classList.contains("dark-mode"));
    }

    function voiceLogin() {
      if (!("webkitSpeechRecognition" in window)) {
        alert("Voice not supported in this browser");
        return;
      }
      const recognition = new webkitSpeechRecognition();
      recognition.lang = currentLang === "hi" ? "hi-IN" : "en-IN";
      recognition.onresult = function(event) {
        const text = event.results[0][0].transcript;
        document.getElementById("email").value = text;
      };
      recognition.start();
    }

    if (localStorage.getItem("darkMode") === "true") {
      document.documentElement.classList.add("dark-mode");
    }

    applyLang();
  </script>
  <script src="script.js"></script>

  <script src="voiceCommands.js"></script>
</body>
</html>
